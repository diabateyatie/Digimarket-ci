<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DigiMarket CI — Catalogue</title>
<style>
  :root {
    --kaki-fonce: #57544A;
    --kaki-recherche: #4B4A31;
    --creme-header: #F3EEE2;
    --fond-clair: #E8DCAF;
    --creme-carte: #FFFFFF;
    --orange: #E8944F;
    --orange-clair: #F2B378;
    --texte-fonce: #2A2A1C;
    --texte-clair: #EDE9DA;
    --gris-texte: #8A8770;
    --bordure: #DCD3A8;
    --etoile: #D9A441;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
    background: var(--fond-clair);
    color: var(--texte-fonce);
  }

  /* ---------- PARTIE 1 : HEADER (logo, recherche, espace vendeur) ---------- */
  header.top-bar {
    background: var(--creme-header);
    padding: 18px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 24px;
    flex-wrap: wrap;
    border-bottom: 3px solid var(--kaki-fonce);
  }

  .logo-bloc { display: flex; align-items: center; gap: 12px; }

  .logo-icone {
    width: 40px; height: 40px;
    background: var(--orange);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    color: white; font-weight: 700; font-size: 18px; flex-shrink: 0;
  }

  .logo-texte h1 { font-size: 20px; letter-spacing: 0.5px; color: var(--texte-fonce); }
  .logo-texte p { font-size: 12.5px; color: var(--gris-texte); margin-top: 2px; }

  .recherche {
    flex: 1; max-width: 460px;
    display: flex; align-items: center;
    background: var(--kaki-recherche);
    border-radius: 8px; padding: 0 14px;
  }

  .recherche input {
    border: none; background: transparent; padding: 10px 8px;
    width: 100%; color: var(--texte-clair); font-size: 14px; outline: none;
  }

  .recherche input::placeholder { color: #C9C6B4; }
  .recherche .icone-loupe { color: #C9C6B4; font-size: 15px; }

  .espace-vendeur { display: flex; align-items: center; gap: 14px; }

  .btn-panier {
    background: var(--creme-carte); border: 1px solid var(--bordure);
    border-radius: 8px; padding: 9px 12px; font-size: 15px;
    cursor: pointer; color: var(--texte-fonce);
  }

  .btn-panier.active {
    border-color: var(--orange);
    box-shadow: 0 0 0 2px rgba(232, 148, 79, 0.18);
  }

  .btn-vendre {
    background: var(--orange); color: white; border: none;
    padding: 10px 20px; border-radius: 8px; font-weight: 600;
    font-size: 14px; cursor: pointer; transition: background 0.15s ease;
  }

  .btn-vendre:hover { background: var(--orange-clair); }

  /* ---------- PARTIE 2 : LIGNE DE MENU ---------- */
  nav.menu-categories {
    background: var(--kaki-fonce);
    padding: 12px 32px;
    display: flex; gap: 10px; flex-wrap: wrap; align-items: center;
  }

  .cat-btn {
    background: transparent; border: 1px solid #5C5A3E;
    color: var(--texte-clair); padding: 8px 16px; border-radius: 999px;
    font-size: 13.5px; cursor: pointer; transition: all 0.15s ease; white-space: nowrap;
  }

  .cat-btn:hover { border-color: var(--orange-clair); }

  .cat-btn.actif {
    background: var(--orange); border-color: var(--orange);
    color: white; font-weight: 600;
  }

  .separateur-menu { width: 1px; height: 22px; background: #6B6858; margin: 0 4px; }

  .menu-blog-wrapper { position: relative; }

  .dropdown-blog {
    display: none;
    position: absolute;
    top: calc(100% + 8px);
    left: 0;
    background: var(--creme-carte);
    border: 1px solid var(--bordure);
    border-radius: 10px;
    box-shadow: 0 12px 24px rgba(0,0,0,0.18);
    min-width: 220px;
    padding: 6px;
    z-index: 10;
  }

  .dropdown-blog.ouvert { display: block; }

  .dropdown-item {
    display: block;
    width: 100%;
    text-align: left;
    background: transparent;
    border: none;
    padding: 9px 12px;
    border-radius: 7px;
    font-size: 13.5px;
    color: var(--texte-fonce);
    cursor: pointer;
  }

  .dropdown-item:hover { background: var(--fond-clair); }

  .dropdown-item.actif {
    background: var(--orange);
    color: white;
    font-weight: 600;
  }

  .compteur-produits { margin-left: auto; color: #C9C6B4; font-size: 13px; }

  /* ---------- PARTIE 3 : GRILLE PRODUITS / ARTICLES ---------- */
  main.grille-section {
    background: var(--fond-clair);
    padding: 20px 32px 60px;
  }

  .grille-produits {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 18px;
  }

  .carte-produit {
    background: var(--creme-carte);
    border-radius: 14px;
    overflow: hidden;
    border: 1px solid var(--bordure);
    transition: transform 0.15s ease, box-shadow 0.15s ease;
    cursor: pointer;
    display: flex;
    flex-direction: column;
  }

  .carte-produit:hover {
    transform: translateY(-4px);
    box-shadow: 0 14px 28px rgba(0,0,0,0.14);
  }

  .visuel-produit {
    height: 130px;
    position: relative;
    overflow: hidden;
  }

  .visuel-produit img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .badge {
    position: absolute;
    top: 12px;
    left: 12px;
    font-size: 10.5px;
    font-weight: 700;
    text-transform: uppercase;
    padding: 4px 10px;
    border-radius: 5px;
    color: white;
    letter-spacing: 0.4px;
    z-index: 2;
  }

  .badge.bestseller { background: var(--orange); }
  .badge.nouveau { background: #3E6B8A; }
  .badge.promo { background: #C0433B; }

  .contenu-carte {
    padding: 11px 13px 14px;
    display: flex;
    flex-direction: column;
    gap: 4px;
    flex: 1;
  }

  .auteur-produit {
    font-size: 11px;
    text-transform: uppercase;
    color: var(--gris-texte);
    letter-spacing: 0.5px;
  }

  .titre-produit {
    font-size: 14px;
    font-weight: 700;
    line-height: 1.3;
    color: var(--texte-fonce);
  }

  .description-courte {
    font-size: 12px;
    color: var(--gris-texte);
    line-height: 1.4;
    margin-top: 0;
  }

  .ligne-preuve-sociale {
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 11.5px;
    color: var(--gris-texte);
    margin-top: 2px;
  }

  .note-etoile { color: var(--etoile); font-weight: 700; }
  .note-etoile span { color: var(--gris-texte); font-weight: 400; }

  .ligne-bas-carte {
    margin-top: auto;
    padding-top: 8px;
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 8px;
  }

  .bloc-prix { display: flex; align-items: baseline; gap: 8px; }

  .prix-produit { color: var(--orange); font-weight: 700; font-size: 17px; }

  .prix-barre {
    color: var(--gris-texte);
    font-size: 13px;
    text-decoration: line-through;
  }

  .categorie-tag {
    font-size: 10.5px;
    background: var(--kaki-recherche);
    color: var(--texte-clair);
    padding: 3px 8px;
    border-radius: 5px;
    white-space: nowrap;
  }

  .date-article { font-size: 11px; color: var(--gris-texte); }

  body.modal-ouvert { overflow: hidden; }

  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(18, 18, 12, 0.72);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    z-index: 1000;
  }

  .modal-overlay[hidden] { display: none; }

  .modal-fiche {
    width: min(920px, 100%);
    max-height: 90vh;
    overflow: auto;
    background: var(--creme-carte);
    border-radius: 20px;
    border: 1px solid var(--bordure);
    box-shadow: 0 20px 40px rgba(0,0,0,0.2);
    position: relative;
    padding: 24px;
  }

  .modal-close {
    position: absolute;
    top: 14px;
    right: 14px;
    width: 40px;
    height: 40px;
    border: none;
    border-radius: 50%;
    background: var(--fond-clair);
    color: var(--kaki-fonce);
    font-size: 24px;
    cursor: pointer;
  }

  .modal-contenu {
    display: grid;
    grid-template-columns: 1.05fr 0.95fr;
    gap: 24px;
    align-items: start;
  }

  .modal-visuel {
    position: relative;
    border-radius: 16px;
    overflow: hidden;
    min-height: 280px;
    background: #f3e9d5;
  }

  .modal-image {
    width: 100%;
    height: 100%;
    min-height: 280px;
    object-fit: cover;
    display: block;
  }

  .modal-body {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .modal-kicker {
    display: inline-flex;
    width: fit-content;
    padding: 6px 10px;
    border-radius: 999px;
    background: var(--fond-clair);
    color: var(--kaki-fonce);
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .modal-body h2 {
    font-size: 24px;
    line-height: 1.3;
    color: var(--texte-fonce);
  }

  .modal-author {
    font-size: 14px;
    font-weight: 600;
    color: var(--orange);
    text-transform: uppercase;
    letter-spacing: 0.4px;
  }

  .modal-rating {
    color: var(--etoile);
    font-weight: 700;
    font-size: 14px;
  }

  .modal-rating span {
    color: var(--gris-texte);
    font-weight: 400;
  }

  .modal-prix-bloc {
    display: flex;
    align-items: baseline;
    gap: 10px;
  }

  .modal-prix {
    color: var(--orange);
    font-size: 22px;
    font-weight: 800;
  }

  .modal-prix-barre {
    color: var(--gris-texte);
    text-decoration: line-through;
    font-size: 15px;
  }

  .modal-description,
  .modal-article-texte p {
    color: var(--texte-fonce);
    line-height: 1.7;
    font-size: 14px;
  }

  .modal-article-texte {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .modal-meta-article {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    color: var(--gris-texte);
    font-size: 13px;
  }

  .btn-ajouter-panier,
  .btn-ajouter-carte {
    margin-top: 6px;
    align-self: flex-start;
    padding: 10px 14px;
    border: none;
    border-radius: 9px;
    background: var(--orange);
    color: white;
    font-weight: 700;
    cursor: pointer;
    font-size: 13px;
  }

  .btn-ajouter-panier:hover,
  .btn-ajouter-carte:hover { background: var(--orange-clair); }

  .btn-ajouter-panier:disabled,
  .btn-ajouter-carte:disabled {
    background: #6B8A5A;
    cursor: default;
    opacity: 1;
  }

  .btn-ajouter-carte {
    margin-top: 10px;
    align-self: stretch;
    font-size: 12px;
  }

  .panier-overlay {
    position: fixed;
    inset: 0;
    background: rgba(18, 18, 12, 0.7);
    z-index: 1100;
    display: flex;
    justify-content: flex-end;
  }

  .panier-overlay[hidden] { display: none; }

  .panier-panneau {
    width: min(420px, 100%);
    height: 100%;
    background: var(--creme-carte);
    box-shadow: -16px 0 30px rgba(0,0,0,0.18);
    display: flex;
    flex-direction: column;
    padding: 20px;
    gap: 14px;
  }

  .panier-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--bordure);
    padding-bottom: 12px;
  }

  .panier-header h3 { font-size: 18px; color: var(--texte-fonce); }

  .panier-close-btn {
    border: none;
    background: var(--fond-clair);
    color: var(--kaki-fonce);
    border-radius: 50%;
    width: 34px;
    height: 34px;
    font-size: 20px;
    cursor: pointer;
  }

  .panier-liste {
    display: flex;
    flex-direction: column;
    gap: 12px;
    overflow: auto;
    padding-right: 4px;
  }

  .panier-item {
    display: flex;
    gap: 10px;
    border: 1px solid var(--bordure);
    border-radius: 12px;
    padding: 10px;
    align-items: center;
  }

  .panier-item img {
    width: 58px;
    height: 58px;
    object-fit: cover;
    border-radius: 8px;
    flex-shrink: 0;
  }

  .panier-item-info {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .panier-item-info strong { font-size: 13px; color: var(--texte-fonce); }
  .panier-item-info span { font-size: 12px; color: var(--gris-texte); }

  .btn-retirer-panier {
    border: none;
    background: transparent;
    color: var(--orange);
    font-weight: 700;
    cursor: pointer;
    font-size: 12px;
    padding: 0;
  }

  .panier-footer {
    margin-top: auto;
    border-top: 1px solid var(--bordure);
    padding-top: 12px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .panier-total {
    display: flex;
    justify-content: space-between;
    font-weight: 700;
    color: var(--texte-fonce);
  }

  .btn-passer-commande {
    border: none;
    border-radius: 10px;
    background: var(--orange);
    color: white;
    padding: 12px 14px;
    font-weight: 700;
    cursor: pointer;
  }

  .panier-vide {
    padding: 20px 0;
    color: var(--gris-texte);
    text-align: center;
    font-size: 14px;
  }

  @media (max-width: 760px) {
    .modal-contenu { grid-template-columns: 1fr; }
  }

  @media (max-width: 480px) {
    .grille-produits { grid-template-columns: repeat(2, 1fr); }
  }
  @media (max-width: 380px) {
    .grille-produits { grid-template-columns: 1fr; }
    header.top-bar { padding: 14px 18px; }
    nav.menu-categories, main.grille-section { padding-left: 18px; padding-right: 18px; }
    .recherche { order: 3; max-width: 100%; }
  }
</style>
</head>

      { titre: "Fixer le juste prix de son ebook : méthode simple", auteur: "Ibrahim Traoré", date: "23 mai", desc: "Une méthode concrète pour ne pas sous-évaluer son travail.", badge: null, rubrique: "marketing", img: "blog-cover-3" },
      { titre: "Stoïcisme et entrepreneuriat : rester stable dans l'incertitude", auteur: "Yatié Coaching", date: "29 mai", desc: "Une philosophie ancienne appliquée aux défis du business.", badge: "bestseller", rubrique: "developpement-personnel", img: "blog-cover-4" },
      { titre: "La discipline avant la motivation", auteur: "Amara Koné", date: "17 mai", desc: "Ce que les entrepreneurs abidjanais répètent le plus souvent.", badge: null, rubrique: "developpement-personnel", img: "blog-cover-5" },
      { titre: "L'infériorité imposée : la déconstruire pour mieux entreprendre", auteur: "Yatié Coaching", date: "8 mai", desc: "Un regard critique sur les freins psychologiques hérités.", badge: "bestseller", rubrique: "developpement-personnel", img: "blog-cover-6" },
      { titre: "Ce que le football ivoirien enseigne sur la discipline collective", auteur: "Yao Kouassi", date: "5 juin", desc: "Des leçons d'équipe transposables à toute organisation.", badge: null, rubrique: "sport", img: "blog-cover-7" },
      { titre: "Préparation mentale : ce que les athlètes enseignent aux entrepreneurs", auteur: "Aïcha Bamba", date: "2 juin", desc: "Gérer la pression avant une échéance importante.", badge: "nouveau", rubrique: "sport", img: "blog-cover-8" },
      { titre: "Suivre sa progression sportive comme on suit son business", auteur: "Moussa Diarra", date: "11 mai", desc: "La régularité des chiffres, à l'entraînement comme en affaires.", badge: null, rubrique: "sport", img: "blog-cover-9" },
      { titre: "Réseauter à Abidjan : créer des relations professionnelles qui durent", auteur: "Fatou Diabaté", date: "26 mai", desc: "Construire un réseau sincère plutôt que transactionnel.", badge: null, rubrique: "relation", img: "blog-cover-10" },
      { titre: "Vendre sans abîmer la confiance de ses clients", auteur: "DigiTools CI", date: "14 mai", desc: "Garder une relation saine avec ceux qui achètent chez soi.", badge: null, rubrique: "relation", img: "blog-cover-11" },
      { titre: "Construire une marque personnelle sans perdre ses relations authentiques", auteur: "Studio Créatif Abidjan", date: "20 mai", desc: "Rester soi-même en devenant visible en ligne.", badge: "nouveau", rubrique: "relation", img: "blog-cover-12" }
    ];

    const grille = document.getElementById('grille-produits');
    const boutonsCat = document.querySelectorAll('.cat-btn');
    const nbProduitsEl = document.getElementById('nb-produits');
    const compteurLabel = document.querySelector('.compteur-produits');

    function urlImage(seed) {
      return `https://picsum.photos/seed/${seed}/500/400`;
    }

    function formaterPrix(prix) { return prix.toLocaleString('fr-FR') + ' FCFA'; }
    function nomCategorie(cat) { return { ebook: 'Ebook', formation: 'Formation vidéo', template: 'Template' }[cat]; }
    function nomBadge(b) {
      return { bestseller: 'Bestseller', nouveau: 'Nouveau', promo: 'Promo' }[b] || '';
    }

    function carteProduit(p) {
      const dejaDansPanier = estDansPanier(p.id);
      return `
        <div class="carte-produit" data-type="produit" data-title="${p.titre}">
          <div class="visuel-produit">
            ${p.badge ? `<span class="badge ${p.badge}">${nomBadge(p.badge)}</span>` : ''}
            <img src="${urlImage(p.img)}" alt="${p.titre}" loading="lazy">
          </div>
          <div class="contenu-carte">
            <span class="auteur-produit">${p.auteur}</span>
            <span class="titre-produit">${p.titre}</span>
            <span class="description-courte">${p.desc}</span>
            <div class="ligne-preuve-sociale">
              <span class="note-etoile">★ ${p.note.toFixed(1)} <span>(${p.avis})</span></span>
              <span>↗ ${p.vues.toLocaleString('fr-FR')}</span>
            </div>
            <div class="ligne-bas-carte">
              <div class="bloc-prix">
                <span class="prix-produit">${formaterPrix(p.prix)}</span>
                ${p.prixOriginal ? `<span class="prix-barre">${formaterPrix(p.prixOriginal)}</span>` : ''}
              </div>
              <span class="categorie-tag">${nomCategorie(p.cat)}</span>
            </div>
            <button class="btn-ajouter-carte" data-product-id="${p.id}" ${dejaDansPanier ? 'disabled' : ''}>${dejaDansPanier ? '✓ Déjà dans le panier' : 'Ajouter au panier'}</button>
          </div>
        </div>
      `;
    }

    function carteArticle(a) {
      return `
        <div class="carte-produit" data-type="article" data-title="${a.titre}">
          <div class="visuel-produit">
            ${a.badge ? `<span class="badge ${a.badge}">${a.badge === 'bestseller' ? 'À la une' : 'Nouveau'}</span>` : ''}
            <img src="${urlImage(a.img)}" alt="${a.titre}" loading="lazy">
          </div>
          <div class="contenu-carte">
            <span class="auteur-produit">${a.auteur}</span>
            <span class="titre-produit">${a.titre}</span>
            <span class="description-courte">${a.desc}</span>
            <div class="ligne-bas-carte">
              <span class="date-article">${a.date}</span>
              <span class="categorie-tag">Blog</span>
            </div>
          </div>
        </div>
      `;
    }

    function nomRubrique(r) {
      return {
        tout: "Toutes les rubriques",
        marketing: "Marketing",
        "developpement-personnel": "Développement personnel",
        sport: "Sport",
        relation: "Relation"
      }[r];
    }

    function descriptionLongueProduit(p) {
      return `${p.desc} Ce parcours a été pensé pour être concret et applicable au quotidien. Chaque idée est présentée de façon simple, avec des exemples adaptés au contexte local et des repères faciles à retenir. En suivant cette logique, il devient plus simple de transformer une idée en action durable.`;
    }

    function texteArticleLong(a) {
      return `
        <p>${a.titre} invite à revenir sur une question centrale, avec un angle pratique et accessible. L’objectif est de proposer des repères utiles pour mieux agir, mieux organiser et mieux avancer.</p>
        <p>Dans ce type de contenu, l’idée n’est pas seulement d’informer, mais de donner un cadre simple pour observer ses habitudes, ses choix et ses priorités. On y trouve des conseils concrets à adapter selon son contexte et ses objectifs.</p>
        <p>Le ton reste volontairement clair, afin d’offrir une lecture fluide, même en dehors d’un cadre professionnel. Chaque partie encourage à poser un regard neuf sur sa démarche et à progresser avec plus de stabilité.</p>
      `;
    }

    function renderModalProduit(p) {
      const badgeMarkup = p.badge ? `<span class="badge ${p.badge}">${nomBadge(p.badge)}</span>` : '';
      const prixMarkup = p.prixOriginal
        ? `<div class="modal-prix-bloc"><span class="modal-prix">${formaterPrix(p.prix)}</span><span class="modal-prix-barre">${formaterPrix(p.prixOriginal)}</span></div>`
        : `<div class="modal-prix-bloc"><span class="modal-prix">${formaterPrix(p.prix)}</span></div>`;
      const dejaDansPanier = estDansPanier(p.id);

      return `
        <div class="modal-visuel">
          ${badgeMarkup}
          <img class="modal-image" src="${urlImage(p.img)}" alt="${p.titre}">
        </div>
        <div class="modal-body">
          <div class="modal-kicker">${nomCategorie(p.cat)}</div>
          <h2 id="modal-titre">${p.titre}</h2>
          <p class="modal-author">${p.auteur}</p>
          <div class="modal-rating">★ ${p.note.toFixed(1)} <span>(${p.avis} avis)</span></div>
          ${prixMarkup}
          <p class="modal-description">${descriptionLongueProduit(p)}</p>
          <button class="btn-ajouter-panier" data-product-id="${p.id}" ${dejaDansPanier ? 'disabled' : ''}>${dejaDansPanier ? '✓ Déjà dans le panier' : 'Ajouter au panier'}</button>
        </div>
      `;
    }

    function renderModalArticle(a) {
      return `
        <div class="modal-visuel">
          ${a.badge ? `<span class="badge ${a.badge}">${a.badge === 'bestseller' ? 'À la une' : 'Nouveau'}</span>` : ''}
          <img class="modal-image" src="${urlImage(a.img)}" alt="${a.titre}">
        </div>
        <div class="modal-body">
          <div class="modal-kicker">Article · ${nomRubrique(a.rubrique)}</div>
          <h2 id="modal-titre">${a.titre}</h2>
          <p class="modal-author">${a.auteur}</p>
          <div class="modal-meta-article"><span>${a.date}</span><span>${nomRubrique(a.rubrique)}</span></div>
          <div class="modal-article-texte">${texteArticleLong(a)}</div>
        </div>
      `;
    }

    const modalOverlay = document.getElementById('modal-overlay');
    const modalContenu = document.getElementById('modal-contenu');
    const modalClose = document.getElementById('modal-close');
    const panierOverlay = document.getElementById('panier-overlay');
    const panierListe = document.getElementById('panier-liste');
    const panierClose = document.getElementById('panier-close');
    const panierTotal = document.getElementById('panier-total');
    const btnPanier = document.querySelector('.btn-panier');
    const compteurPanierEl = document.getElementById('compteur-panier');
    let panier = [];
    let modalTypeCourant = null;
    let modalTitreCourant = null;

    function estDansPanier(productId) {
      return panier.some(item => item.id === productId);
    }

    function ajouterAuPanier(productId) {
      const produit = produits.find(p => p.id === productId);
      if (!produit || estDansPanier(productId)) return;
      panier.push({ ...produit });
      renderPanier();
      renderCartButtons();
    }

    function retirerDuPanier(productId) {
      panier = panier.filter(item => item.id !== productId);
      renderPanier();
      renderCartButtons();
    }

    function renderCartButtons() {
      document.querySelectorAll('.btn-ajouter-carte').forEach(btn => {
        const productId = Number(btn.dataset.productId);
        const dejaDansPanier = estDansPanier(productId);
        btn.disabled = dejaDansPanier;
        btn.textContent = dejaDansPanier ? '✓ Déjà dans le panier' : 'Ajouter au panier';
      });
      document.querySelectorAll('.btn-ajouter-panier').forEach(btn => {
        const productId = Number(btn.dataset.productId);
        const dejaDansPanier = estDansPanier(productId);
        btn.disabled = dejaDansPanier;
        btn.textContent = dejaDansPanier ? '✓ Déjà dans le panier' : 'Ajouter au panier';
      });
    }

    function renderPanier() {
      compteurPanierEl.textContent = panier.length;
      btnPanier.classList.toggle('active', panier.length > 0);
      const total = panier.reduce((sum, item) => sum + item.prix, 0);
      panierTotal.textContent = formaterPrix(total);

      if (!panier.length) {
        panierListe.innerHTML = '<div class="panier-vide">Votre panier est vide</div>';
        return;
      }

      panierListe.innerHTML = panier.map(item => `
        <div class="panier-item">
          <img src="${urlImage(item.img)}" alt="${item.titre}">
          <div class="panier-item-info">
            <strong>${item.titre}</strong>
            <span>${formaterPrix(item.prix)}</span>
          </div>
          <button class="btn-retirer-panier" data-product-id="${item.id}">Retirer</button>
        </div>
      `).join('');
    }

    function ouvrirModal(type, titre) {
      const item = type === 'article'
        ? articles.find(a => a.titre === titre)
        : produits.find(p => p.titre === titre);

      if (!item) return;

      modalTypeCourant = type;
      modalTitreCourant = titre;
      modalContenu.innerHTML = type === 'article' ? renderModalArticle(item) : renderModalProduit(item);
      modalOverlay.hidden = false;
      document.body.classList.add('modal-ouvert');
    }

    function fermerModal() {
      modalOverlay.hidden = true;
      document.body.classList.remove('modal-ouvert');
    }

    function ouvrirPanier() {
      panierOverlay.hidden = false;
      document.body.classList.add('modal-ouvert');
    }

    function fermerPanier() {
      panierOverlay.hidden = true;
      document.body.classList.remove('modal-ouvert');
    }

    function afficherContenu(mode, rubrique) {
      if (mode === 'blog') {
        const r = rubrique || 'tout';
        const liste = r === 'tout' ? articles : articles.filter(a => a.rubrique === r);
        grille.innerHTML = liste.map(carteArticle).join('');
        nbProduitsEl.textContent = liste.length;
        compteurLabel.lastChild.textContent = ' articles · ' + nomRubrique(r);
        return;
      }
      const liste = mode === 'tout' ? produits : produits.filter(p => p.cat === mode);
      grille.innerHTML = liste.map(carteProduit).join('');
      nbProduitsEl.textContent = liste.length;
      compteurLabel.lastChild.textContent = ' produits';
      renderCartButtons();
    }

    boutonsCat.forEach(btn => {
      btn.addEventListener('click', (e) => {
        if (btn.id === 'btn-blog') {
          e.stopPropagation();
          dropdownBlog.classList.toggle('ouvert');
          return;
        }
        dropdownBlog.classList.remove('ouvert');
        boutonsCat.forEach(b => b.classList.remove('actif'));
        btn.classList.add('actif');
        afficherContenu(btn.dataset.cat);
      });
    });

    const dropdownBlog = document.getElementById('dropdown-blog');
    const btnBlog = document.getElementById('btn-blog');
    const itemsRubrique = document.querySelectorAll('.dropdown-item');

    itemsRubrique.forEach(item => {
      item.addEventListener('click', (e) => {
        e.stopPropagation();
        itemsRubrique.forEach(i => i.classList.remove('actif'));
        item.classList.add('actif');
        boutonsCat.forEach(b => b.classList.remove('actif'));
        btnBlog.classList.add('actif');
        dropdownBlog.classList.remove('ouvert');
        afficherContenu('blog', item.dataset.rubrique);
      });
    });

    grille.addEventListener('click', (event) => {
      const boutonAjout = event.target.closest('.btn-ajouter-carte');
      if (boutonAjout) {
        event.stopPropagation();
        ajouterAuPanier(Number(boutonAjout.dataset.productId));
        return;
      }
      const carte = event.target.closest('.carte-produit');
      if (!carte) return;
      ouvrirModal(carte.dataset.type, carte.dataset.title);
    });

    modalContenu.addEventListener('click', (event) => {
      const boutonAjout = event.target.closest('.btn-ajouter-panier');
      if (!boutonAjout) return;
      ajouterAuPanier(Number(boutonAjout.dataset.productId));
      if (modalTypeCourant === 'produit') {
        ouvrirModal(modalTypeCourant, modalTitreCourant);
      }
    });

    panierListe.addEventListener('click', (event) => {
      const boutonRetirer = event.target.closest('.btn-retirer-panier');
      if (!boutonRetirer) return;
      retirerDuPanier(Number(boutonRetirer.dataset.productId));
    });

    modalClose.addEventListener('click', fermerModal);
    modalOverlay.addEventListener('click', (event) => {
      if (event.target === modalOverlay) fermerModal();
    });
    panierClose.addEventListener('click', fermerPanier);
    panierOverlay.addEventListener('click', (event) => {
      if (event.target === panierOverlay) fermerPanier();
    });
    btnPanier.addEventListener('click', ouvrirPanier);

    document.addEventListener('keydown', (event) => {
      if (event.key === 'Escape') {
        if (!modalOverlay.hidden) fermerModal();
        else if (!panierOverlay.hidden) fermerPanier();
      }
    });

    document.addEventListener('click', () => {
      dropdownBlog.classList.remove('ouvert');
    });

    renderPanier();
    renderCartButtons();
    afficherContenu('tout');
  </script>

</body>
</html>
